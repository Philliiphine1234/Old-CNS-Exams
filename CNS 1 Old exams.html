<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CNS Paper 1 – Subject‑based Quiz</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .quiz-container {
            background: #ffffff;
            max-width: 860px;
            width: 100%;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 20, 30, 0.12);
            padding: 32px 36px 40px;
            transition: all 0.2s;
        }

        @media (max-width: 550px) {
            .quiz-container {
                padding: 20px 18px 28px;
                border-radius: 20px;
            }
        }

        /* header */
        .quiz-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            gap: 10px 16px;
        }

        .quiz-title {
            font-size: 22px;
            font-weight: 700;
            color: #0b1e33;
            letter-spacing: -0.3px;
        }

        .quiz-title span {
            color: #2a7de1;
        }

        .progress-badge {
            background: #e9edf4;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            color: #1a3a5c;
        }

        .progress-badge strong {
            color: #0b1e33;
        }

        /* subject tabs */
        .subject-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 12px;
        }

        .subject-btn {
            padding: 6px 18px;
            border: 2px solid transparent;
            border-radius: 40px;
            background: #f0f4f8;
            color: #1a3a5c;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .subject-btn:hover {
            background: #e2eaf5;
        }

        .subject-btn.active {
            background: #2a7de1;
            color: #fff;
            border-color: #2a7de1;
        }

        .subject-count {
            font-size: 12px;
            background: #dce4ef;
            padding: 0 10px;
            border-radius: 30px;
            color: #1a3a5c;
            margin-left: 4px;
        }
        .subject-btn.active .subject-count {
            background: rgba(255,255,255,0.3);
            color: #fff;
        }

        /* progress bar */
        .progress-track {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2a7de1, #5b9cf5);
            border-radius: 12px;
            transition: width 0.35s ease;
            width: 0%;
        }

        /* question navigator */
        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            padding: 4px 0 8px;
            border-bottom: 1px solid #eef2f7;
        }

        .qnav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #e2eaf5;
            background: #f7faff;
            color: #1a3a5c;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qnav-btn:hover {
            background: #e2eaf5;
            transform: scale(1.05);
        }

        .qnav-btn.active {
            border-color: #2a7de1;
            background: #2a7de1;
            color: #fff;
        }

        .qnav-btn.answered-correct {
            border-color: #1c9e6c;
            background: #e1f5ed;
            color: #1c9e6c;
        }

        .qnav-btn.answered-wrong {
            border-color: #d45a5a;
            background: #fdeaea;
            color: #d45a5a;
        }

        .qnav-btn.answered-correct.active {
            background: #1c9e6c;
            color: #fff;
        }

        .qnav-btn.answered-wrong.active {
            background: #d45a5a;
            color: #fff;
        }

        /* question area */
        .question-number {
            font-size: 14px;
            font-weight: 600;
            color: #5e7a99;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }

        .question-text {
            font-size: 19px;
            font-weight: 500;
            line-height: 1.6;
            color: #0b1e33;
            margin-bottom: 26px;
            padding: 4px 0 2px;
        }

        /* options */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            background: #f7faff;
            border: 2px solid #e2eaf5;
            border-radius: 14px;
            padding: 14px 18px;
            cursor: pointer;
            transition: border 0.18s, background 0.18s, transform 0.1s;
            position: relative;
        }

        .option-item:hover {
            background: #f0f6ff;
            border-color: #b6cef0;
        }

        .option-item.selected {
            border-color: #2a7de1;
            background: #eaf1fe;
        }

        .option-item.correct-reveal {
            border-color: #1c9e6c;
            background: #e1f5ed;
        }

        .option-item.wrong-reveal {
            border-color: #d45a5a;
            background: #fdeaea;
        }

        .option-item.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        .option-item.disabled.correct-reveal {
            opacity: 1;
        }

        .option-item.disabled.wrong-reveal {
            opacity: 1;
        }

        .option-letter {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            background: #e2eaf5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #1a3a5c;
            transition: background 0.2s, color 0.2s;
        }

        .option-item.selected .option-letter {
            background: #2a7de1;
            color: #fff;
        }

        .option-item.correct-reveal .option-letter {
            background: #1c9e6c;
            color: #fff;
        }

        .option-item.wrong-reveal .option-letter {
            background: #d45a5a;
            color: #fff;
        }

        .option-text {
            font-size: 16px;
            line-height: 1.5;
            color: #1a2f44;
            padding-top: 2px;
            flex: 1;
        }

        /* feedback */
        .feedback-box {
            background: #f0f6ff;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: none;
            font-size: 15px;
            line-height: 1.6;
            border-left: 5px solid #2a7de1;
        }

        .feedback-box.show {
            display: block;
        }

        .feedback-box.correct {
            background: #e1f5ed;
            border-left-color: #1c9e6c;
        }

        .feedback-box.wrong {
            background: #fdeaea;
            border-left-color: #d45a5a;
        }

        .feedback-box .fb-label {
            font-weight: 700;
            font-size: 14px;
            display: block;
            margin-bottom: 2px;
        }

        .feedback-box.correct .fb-label {
            color: #1c9e6c;
        }
        .feedback-box.wrong .fb-label {
            color: #d45a5a;
        }

        /* controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 4px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 26px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #e2eaf5;
            color: #1a3a5c;
        }

        .btn:hover {
            transform: translateY(-1px);
        }
        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: #2a7de1;
            color: #fff;
        }
        .btn-primary:hover {
            background: #1e68c4;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #cbd8e8;
        }
        .btn-outline:hover {
            background: #e9edf4;
        }

        .btn-sm {
            padding: 6px 16px;
            font-size: 13px;
        }

        /* stats */
        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #3d5a78;
            font-weight: 500;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 18px;
            border-top: 1px solid #e2eaf5;
            padding-top: 16px;
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stats .num {
            font-weight: 700;
            color: #0b1e33;
        }

        /* end screen */
        .end-screen {
            display: none;
            text-align: center;
            padding: 30px 10px 12px;
        }

        .end-screen.show {
            display: block;
        }

        .end-screen .big-icon {
            font-size: 56px;
            margin-bottom: 8px;
        }

        .end-screen h2 {
            font-size: 28px;
            font-weight: 700;
            color: #0b1e33;
            margin-bottom: 6px;
        }

        .end-screen .score-display {
            font-size: 52px;
            font-weight: 800;
            color: #2a7de1;
            margin: 8px 0 4px;
        }

        .end-screen .sub-text {
            color: #3d5a78;
            font-size: 17px;
            margin-bottom: 20px;
        }

        .end-screen .btn {
            margin: 4px 6px;
        }

        .hidden {
            display: none !important;
        }

        .question-meta {
            font-size: 13px;
            color: #6f8aa8;
            margin-top: 6px;
        }

        .question-scroll {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 4px;
        }

        .question-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .question-scroll::-webkit-scrollbar-track {
            background: #eef2f7;
            border-radius: 8px;
        }
        .question-scroll::-webkit-scrollbar-thumb {
            background: #c4d2e3;
            border-radius: 8px;
        }

        /* scrollable nav */
        .nav-scroll {
            max-height: 140px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .nav-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .nav-scroll::-webkit-scrollbar-track {
            background: #eef2f7;
            border-radius: 8px;
        }
        .nav-scroll::-webkit-scrollbar-thumb {
            background: #c4d2e3;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="quiz-container" id="app">

        <!-- header -->
        <div class="quiz-header">
            <div class="quiz-title">🧠 CNS <span>Paper 1</span></div>
            <div class="progress-badge">
                <strong id="qCounter">0</strong> / <span id="totalQ">0</span>
            </div>
        </div>

        <!-- subject tabs -->
        <div class="subject-tabs" id="subjectTabs">
            <button class="subject-btn active" data-subject="all">All <span class="subject-count" id="countAll">0</span></button>
            <button class="subject-btn" data-subject="Anatomy">Anatomy <span class="subject-count" id="countAnatomy">0</span></button>
            <button class="subject-btn" data-subject="Physiology">Physiology <span class="subject-count" id="countPhysiology">0</span></button>
            <button class="subject-btn" data-subject="Biochemistry">Biochemistry <span class="subject-count" id="countBiochemistry">0</span></button>
            <button class="subject-btn" data-subject="Histology">Histology <span class="subject-count" id="countHistology">0</span></button>
            <button class="subject-btn" data-subject="Pharmacology">Pharmacology <span class="subject-count" id="countPharmacology">0</span></button>
        </div>

        <!-- progress -->
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- question navigator -->
        <div class="question-nav nav-scroll" id="questionNav"></div>

        <!-- main quiz area -->
        <div id="quizArea">

            <div class="question-scroll">

                <div class="question-number" id="qNumLabel">Question 1</div>
                <div class="question-text" id="qText">Loading questions…</div>

                <div class="options-list" id="optionsContainer"></div>

                <div class="feedback-box" id="feedbackBox">
                    <span class="fb-label" id="fbLabel"></span>
                    <span id="fbText"></span>
                </div>

                <div class="question-meta" id="qMeta"></div>

            </div>

            <!-- controls -->
            <div class="controls">
                <div class="btn-group">
                    <button class="btn btn-outline btn-sm" id="resetBtn" title="Reset quiz">⟲ Reset</button>
                    <button class="btn btn-outline btn-sm" id="shuffleBtn" title="Shuffle questions">🔀 Shuffle</button>
                </div>

                <div class="btn-group">
                    <button class="btn btn-outline btn-sm" id="prevBtn">← Back</button>
                    <button class="btn btn-outline btn-sm" id="nextBtn">Next →</button>
                </div>
            </div>

            <!-- stats -->
            <div class="stats">
                <span>✅ Correct: <span class="num" id="correctCount">0</span></span>
                <span>❌ Wrong: <span class="num" id="wrongCount">0</span></span>
                <span style="margin-left:auto; opacity:0.6;">⏱️ <span id="answeredCount">0</span> answered</span>
            </div>

        </div>

        <!-- end screen -->
        <div class="end-screen" id="endScreen">
            <div class="big-icon">🏁</div>
            <h2>You finished!</h2>
            <div class="score-display" id="finalScore">0%</div>
            <div class="sub-text" id="finalSub">Great effort — keep learning!</div>
            <div>
                <button class="btn btn-primary" id="restartBtn">⟲ Restart Quiz</button>
                <button class="btn btn-outline" id="reviewBtn">📋 Review wrong answers</button>
            </div>
        </div>

    </div>

    <script>
        // ─── DATA with subject assignment ──────────────────────────────────
        // (same as before, full question bank)
        const QUESTION_BANK = [
            // ─── Anatomy ──────────────────────────────────────────────────────
            { id: 1, subject: 'Anatomy', text: 'In infants, the spinal cord typically ends at which level?',
                options: [{ label: 'A', text: 'T12' }, { label: 'B', text: 'L1' }, { label: 'C', text: 'L2' },
                    { label: 'D', text: 'L3' }, { label: 'E', text: 'L4' }
                ], answer: 'D', meta: 'Final 1 – 2018 · Assessment 1 – 2023' },
            { id: 2, subject: 'Anatomy', text: 'The subarachnoid space of the spinal cord ends at which vertebral level?',

                ], answer: 'A', meta: '' },
            { id: 4, subject: 'Anatomy', text: 'S2 spinal segment lies opposite to level of ...... vertebra',

                    { label: 'D', text: 'L2' }, { label: 'E', text: 'L1' }
                ], answer: 'D', meta: 'Final 1 – 2019 · Final 1 – 2025' },
            { id: 5, subject: 'Anatomy', text: 'Both rami of ...... spinal nerve are purely motor',
                options: [{ label: 'A', text: 'C1' }, { label: 'B', text: 'T1' }, { label: 'C', text: 'T12' },
                    { label: 'D', text: 'L1' }, { label: 'E', text: 'All rami are mixed' }
                ], answer: 'A', meta: 'Final 1 – 2025' },
            { id: 6, subject: 'Anatomy', text: 'Preganglionic sympathetic fibers lies at ......',
                options: [{ label: 'A', text: 'C1' }, { label: 'B', text: 'C8' }, { label: 'C', text: 'L2' },
                    { label: 'D', text: 'L3' }, { label: 'E', text: 'S1' }
                ], answer: 'C', meta: 'Final 1 – 2019 – Summer' },
            { id: 7, subject: 'Anatomy', text: 'A patient sustains a fracture of the T4 vertebra. Which spinal cord segment is most likely affected?',
                options: [{ label: 'A', text: 'T2 segment' }, { label: 'B', text: 'T3 segment' },
                    { label: 'C', text: 'T4 segment' }, { label: 'D', text: 'T5 segment' },

            { id: 8, subject: 'Anatomy', text: 'Which of the following pairs is matched correctly in the motor hierarchy?',

                ], answer: 'D', meta: '' },
            { id: 9, subject: 'Anatomy', text: 'Damage to which brain area typically causes sensory aphasia?',

                    { label: 'E', text: 'Primary auditory cortex' }
                ], answer: 'B', meta: 'Assessment 1 – 2020' },
            { id: 10, subject: 'Anatomy', text: 'Which of the following is true regarding the representation in the somatosensory area one S1?',

            { id: 12, subject: 'Anatomy', text: 'Primary sensory cortex is present in which of the following areas?',

            { id: 14, subject: 'Anatomy', text: 'Which tract continues as the neospinothalamic pathway carrying pain and temperature sensations to the thalamus?',

                    { label: 'E', text: 'Corticospinal tract' }

            { id: 20, subject: 'Anatomy', text: 'Which of the following correctly pairs a neural structure with its functional role?',

                options: [{ label: 'A', text: 'Selegiline' }, { label: 'B', text: 'Levodopa' },
                    { label: 'C', text: 'Bromocriptine' }, { label: 'D', text: 'Apomorphine' },
                    { label: 'E', text: 'Entacapone' }
                ], answer: 'D', meta: 'Final 1 – 2019' },
            { id: 291, subject: 'Pharmacology', text: 'Drug …… is used for tremors',
                options: [{ label: 'A', text: 'Levodopa' }, { label: 'B', text: 'Bromocriptine' },
                    { label: 'C', text: 'Benztropine' }, { label: 'D', text: 'Amantadine' },
                    { label: 'E', text: 'Selegiline' }
                ], answer: 'C', meta: 'Final 1 – 2019 – Summer' },
            { id: 292, subject: 'Pharmacology', text: 'Which of the following drugs can be used to control tremors in a patient with benign prostatic hyperplasia?',
                options: [{ label: 'A', text: 'Amantadine' }, { label: 'B', text: 'Levodopa' },
                    { label: 'C', text: 'Selegiline' }, { label: 'D', text: 'Propranolol' },
                    { label: 'E', text: 'Entacapone' }
                ], answer: 'D', meta: 'Final 1 – 2022 · Assessment 1 – 2025' }
        ];

        // ─── QUIZ ENGINE ──────────────────────────────────────────────────────

        const state = {
            allQuestions: QUESTION_BANK,
            filteredQuestions: [],
            currentIndex: 0,
            selected: null,
            answered: false,
            correctCount: 0,
            wrongCount: 0,
            userAnswers: {},
            results: {},
            currentSubject: 'all'
        };

        const $ = id => document.getElementById(id);
        const qText = $('qText');
        const qNumLabel = $('qNumLabel');
        const qMeta = $('qMeta');
        const optionsContainer = $('optionsContainer');
        const feedbackBox = $('feedbackBox');
        const fbLabel = $('fbLabel');
        const fbText = $('fbText');
        const progressFill = $('progressFill');
        const qCounter = $('qCounter');
        const totalQ = $('totalQ');
        const correctCount = $('correctCount');
        const wrongCount = $('wrongCount');
        const answeredCount = $('answeredCount');
        const prevBtn = $('prevBtn');
        const nextBtn = $('nextBtn');
        const resetBtn = $('resetBtn');
        const shuffleBtn = $('shuffleBtn');
        const restartBtn = $('restartBtn');
        const reviewBtn = $('reviewBtn');
        const quizArea = $('quizArea');
        const endScreen = $('endScreen');
        const finalScore = $('finalScore');
        const finalSub = $('finalSub');
        const subjectTabs = document.querySelectorAll('.subject-btn');
        const questionNav = $('questionNav');

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getSubjectCount(subject) {
            if (subject === 'all') return state.allQuestions.length;
            return state.allQuestions.filter(q => q.subject === subject).length;
        }

        function updateSubjectCounts() {
            document.getElementById('countAll').textContent = state.allQuestions.length;
            document.getElementById('countAnatomy').textContent = getSubjectCount('Anatomy');
            document.getElementById('countPhysiology').textContent = getSubjectCount('Physiology');
            document.getElementById('countBiochemistry').textContent = getSubjectCount('Biochemistry');
            document.getElementById('countHistology').textContent = getSubjectCount('Histology');
            document.getElementById('countPharmacology').textContent = getSubjectCount('Pharmacology');
        }

        function setSubject(subject) {
            state.currentSubject = subject;
            subjectTabs.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.subject === subject);
            });
            if (subject === 'all') {
                state.filteredQuestions = [...state.allQuestions];
            } else {
                state.filteredQuestions = state.allQuestions.filter(q => q.subject === subject);
            }
            state.currentIndex = 0;
            state.selected = null;
            state.answered = false;
            state.correctCount = 0;
            state.wrongCount = 0;
            state.userAnswers = {};
            state.results = {};
            totalQ.textContent = state.filteredQuestions.length;
            endScreen.classList.remove('show');
            quizArea.style.display = 'block';
            renderQuestion();
            updateStats();
            buildNavigator();
        }

        function buildNavigator() {
            questionNav.innerHTML = '';
            const total = state.filteredQuestions.length;
            for (let i = 0; i < total; i++) {
                const btn = document.createElement('button');
                btn.className = 'qnav-btn';
                btn.textContent = i + 1;
                btn.dataset.index = i;
                const result = state.results[i];
                if (result === 'correct') btn.classList.add('answered-correct');
                else if (result === 'wrong') btn.classList.add('answered-wrong');
                if (i === state.currentIndex) btn.classList.add('active');
                btn.addEventListener('click', () => {
                    goToQuestion(i);
                });
                questionNav.appendChild(btn);
            }
        }

        function goToQuestion(index) {
            if (index < 0 || index >= state.filteredQuestions.length) return;
            state.currentIndex = index;
            // reset selection for this question if not answered
            if (!state.results[index]) {
                state.selected = state.userAnswers[index] || null;
                state.answered = false;
            } else {
                state.selected = state.userAnswers[index] || null;
                state.answered = true;
            }
            renderQuestion();
            buildNavigator();
        }

        function initQuiz() {
            setSubject('all');
            updateSubjectCounts();
        }

        function renderQuestion() {
            const q = state.filteredQuestions[state.currentIndex];
            if (!q) {
                qText.textContent = 'No questions available for this subject.';
                optionsContainer.innerHTML = '';
                feedbackBox.classList.remove('show');
                return;
            }

            qNumLabel.textContent = `Question ${state.currentIndex + 1} of ${state.filteredQuestions.length}`;
            qText.textContent = q.text;
            qMeta.textContent = q.meta || '';

            optionsContainer.innerHTML = '';
            const letters = ['A', 'B', 'C', 'D', 'E'];
            q.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.dataset.label = opt.label;
                div.innerHTML = `
              <span class="option-letter">${opt.label}</span>
              <span class="option-text">${opt.text}</span>
            `;
                div.addEventListener('click', () => handleOptionClick(opt.label));
                optionsContainer.appendChild(div);
            });

            // Restore selection if any
            const prevAns = state.userAnswers[state.currentIndex];
            if (prevAns) {
                const items = optionsContainer.querySelectorAll('.option-item');
                items.forEach(el => {
                    if (el.dataset.label === prevAns) {
                        el.classList.add('selected');
                        state.selected = prevAns;
                    }
                });
                if (state.results[state.currentIndex]) {
                    const isCorrect = state.results[state.currentIndex] === 'correct';
                    showFeedback(isCorrect, q.answer);
                    state.answered = true;
                    optionsContainer.querySelectorAll('.option-item').forEach(el => {
                        el.classList.add('disabled');
                        if (el.dataset.label === q.answer) el.classList.add('correct-reveal');
                        if (el.dataset.label === prevAns && prevAns !== q.answer) el.classList.add('wrong-reveal');
                    });
                } else {
                    state.answered = false;
                    feedbackBox.classList.remove('show', 'correct', 'wrong');
                }
            } else {
                state.selected = null;
                state.answered = false;
                feedbackBox.classList.remove('show', 'correct', 'wrong');
            }

            // always enable prev/next
            prevBtn.disabled = state.currentIndex === 0;
            const isLast = state.currentIndex === state.filteredQuestions.length - 1;
            nextBtn.textContent = isLast ? 'Finish' : 'Next →';

            const pct = state.filteredQuestions.length > 0 ? ((state.currentIndex + 1) / state.filteredQuestions.length) * 100 : 0;
            progressFill.style.width = `${Math.min(pct, 100)}%`;
            qCounter.textContent = state.currentIndex + 1;

            document.querySelector('.question-scroll').scrollTop = 0;
            buildNavigator();
        }

        function handleOptionClick(label) {
            if (state.answered) return;
            const q = state.filteredQuestions[state.currentIndex];
            const items = optionsContainer.querySelectorAll('.option-item');
            items.forEach(el => el.classList.remove('selected'));
            items.forEach(el => {
                if (el.dataset.label === label) el.classList.add('selected');
            });
            state.selected = label;
            state.userAnswers[state.currentIndex] = label;
            submitAnswer(label);
        }

        function submitAnswer(selected) {
            const q = state.filteredQuestions[state.currentIndex];
            const isCorrect = selected === q.answer;
            state.answered = true;
            state.results[state.currentIndex] = isCorrect ? 'correct' : 'wrong';
            if (isCorrect) state.correctCount++;
            else state.wrongCount++;

            showFeedback(isCorrect, q.answer);
            updateStats();
            buildNavigator();

            const items = optionsContainer.querySelectorAll('.option-item');
            items.forEach(el => {
                el.classList.add('disabled');
                if (el.dataset.label === q.answer) el.classList.add('correct-reveal');
                if (el.dataset.label === selected && selected !== q.answer) el.classList.add('wrong-reveal');
            });
        }

        function showFeedback(isCorrect, answer) {
            feedbackBox.className = 'feedback-box show';
            feedbackBox.classList.add(isCorrect ? 'correct' : 'wrong');
            fbLabel.textContent = isCorrect ? '✅ Correct!' : '❌ Incorrect';
            fbText.textContent = isCorrect ? 'Well done!' : `The correct answer was ${answer}.`;
        }

        function updateStats() {
            correctCount.textContent = state.correctCount;
            wrongCount.textContent = state.wrongCount;
            const answered = Object.keys(state.results).length;
            answeredCount.textContent = answered;
        }

        function goToPrev() {
            if (state.currentIndex > 0) {
                goToQuestion(state.currentIndex - 1);
            }
        }

        function goToNext() {
            const isLast = state.currentIndex === state.filteredQuestions.length - 1;
            if (isLast) {
                finishQuiz();
                return;
            }
            goToQuestion(state.currentIndex + 1);
        }

        function finishQuiz() {
            const total = state.filteredQuestions.length;
            const correct = state.correctCount;
            const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
            finalScore.textContent = `${pct}%`;
            let msg = 'Great effort — keep learning!';
            if (pct >= 90) msg = '🌟 Excellent! You really know your CNS!';
            else if (pct >= 70) msg = '👍 Good job! Review the ones you missed.';
            else if (pct >= 50) msg = '📖 Keep studying — you\'ll get there!';
            else msg = '💪 Practice makes perfect. Try again!';
            finalSub.textContent = msg;
            quizArea.style.display = 'none';
            endScreen.classList.add('show');
        }

        function resetQuiz() {
            setSubject(state.currentSubject);
        }

        function shuffleQuiz() {
            const currentQ = state.filteredQuestions[state.currentIndex];
            state.filteredQuestions = shuffleArray([...state.filteredQuestions]);
            const newIdx = state.filteredQuestions.findIndex(q => q.id === currentQ.id);
            state.currentIndex = newIdx >= 0 ? newIdx : 0;
            state.selected = null;
            state.answered = false;
            state.userAnswers = {};
            state.results = {};
            state.correctCount = 0;
            state.wrongCount = 0;
            renderQuestion();
            updateStats();
            feedbackBox.classList.remove('show', 'correct', 'wrong');
            buildNavigator();
        }

        // ─── Event listeners ──────────────────────────────────────────────────

        subjectTabs.forEach(btn => {
            btn.addEventListener('click', () => {
                const subject = btn.dataset.subject;
                setSubject(subject);
            });
        });

        prevBtn.addEventListener('click', goToPrev);
        nextBtn.addEventListener('click', goToNext);
        resetBtn.addEventListener('click', resetQuiz);
        shuffleBtn.addEventListener('click', shuffleQuiz);
        restartBtn.addEventListener('click', resetQuiz);
        reviewBtn.addEventListener('click', resetQuiz);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                goToNext();
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                goToPrev();
            }
            if (e.key === 'r' || e.key === 'R') resetQuiz();
            if (!state.answered && !endScreen.classList.contains('show')) {
                const num = parseInt(e.key);
                if (num >= 1 && num <= 5) {
                    const labels = ['A', 'B', 'C', 'D', 'E'];
                    handleOptionClick(labels[num - 1]);
                }
            }
        });

        // ─── Start ──────────────────────────────────────────────────────────────

        initQuiz();
    </script>
</body>
</html>
